name: Deploy Payload CMS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: payload-cms-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /var/www/payload-cms
            git stash push -u -m "gha-auto-stash-$(date +%Y%m%d%H%M%S)" || true
            git pull origin main
            npm ci
            npm run build
            node -e "
              require('dotenv').config();
              const { Client } = require('pg');
              const c = new Client({ connectionString: process.env.DATABASE_URL });
              c.connect().then(() => c.query(\`
                INSERT INTO payload_migrations (name, batch, updated_at, created_at)
                VALUES
                  ('20260216_081521_init',  1, NOW(), NOW()),
                  ('20260218_003924',       1, NOW(), NOW()),
                  ('20260218_135222',       1, NOW(), NOW())
                ON CONFLICT (name) DO NOTHING
              \`)).then(() => c.end()).catch(e => { console.error(e.message); c.end(); });
            "
            npm run payload migrate
            pm2 restart payload-cms --update-env

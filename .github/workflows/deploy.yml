name: Deploy Payload CMS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: payload-cms-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /var/www/payload-cms
            git stash push -u -m "gha-auto-stash-$(date +%Y%m%d%H%M%S)" || true
            git pull origin main
            npm ci
            npm run build
            node -e "
              require('dotenv').config();
              const { Client } = require('pg');
              const c = new Client({ connectionString: process.env.DATABASE_URL });
              c.connect().then(async () => {
                await c.query(\`
                  CREATE TABLE IF NOT EXISTS blog (
                    id serial PRIMARY KEY,
                    title varchar NOT NULL,
                    slug varchar NOT NULL,
                    description varchar,
                    updated_at timestamptz DEFAULT now() NOT NULL,
                    created_at timestamptz DEFAULT now() NOT NULL
                  )
                \`);
                await c.query('CREATE UNIQUE INDEX IF NOT EXISTS blog_slug_idx ON blog (slug)');
                await c.query(\`
                  CREATE TABLE IF NOT EXISTS blog_post (
                    id serial PRIMARY KEY,
                    title varchar NOT NULL,
                    slug varchar NOT NULL,
                    blog_id integer,
                    visibility varchar DEFAULT 'draft' NOT NULL,
                    author varchar,
                    published_at timestamptz,
                    excerpt varchar,
                    featured_image_id integer,
                    content jsonb,
                    seo_meta_title varchar,
                    seo_meta_description varchar,
                    seo_canonical_url varchar,
                    seo_no_index boolean DEFAULT false,
                    seo_open_graph_og_title varchar,
                    seo_open_graph_og_description varchar,
                    seo_open_graph_og_image_id integer,
                    updated_at timestamptz DEFAULT now() NOT NULL,
                    created_at timestamptz DEFAULT now() NOT NULL
                  )
                \`);
                await c.query('CREATE INDEX IF NOT EXISTS blog_post_slug_idx ON blog_post (slug)');
                await c.query('CREATE INDEX IF NOT EXISTS blog_post_blog_idx ON blog_post (blog_id)');
                await c.query(\`
                  CREATE TABLE IF NOT EXISTS blog_post_tags (
                    _order integer NOT NULL,
                    _parent_id integer NOT NULL,
                    id varchar PRIMARY KEY,
                    tag varchar NOT NULL
                  )
                \`);
                const allMigrations = [
                  '20260216_081521_init',
                  '20260218_003924',
                  '20260218_135222',
                  '20260313_000000_add_blog'
                ];
                for (const name of allMigrations) {
                  await c.query(
                    'INSERT INTO payload_migrations (name,batch,updated_at,created_at) SELECT \$1,1,NOW(),NOW() WHERE NOT EXISTS (SELECT 1 FROM payload_migrations WHERE name=\$1)',
                    [name]
                  );
                }
                console.log('Blog tables ensured and migration history seeded');
                await c.end();
              }).catch(e => { console.error(e.message); c.end(); process.exit(1); });
            "
            pm2 restart payload-cms --update-env

name: Deploy Payload CMS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: payload-cms-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /var/www/payload-cms
            git stash push -u -m "gha-auto-stash-$(date +%Y%m%d%H%M%S)" || true
            git pull origin main
            npm ci
            npm run repair:blog-block-tables
            npm run generate:importmap
            rm -rf .next
            npm run build
            node -e "
              require('dotenv').config();
              const { Client } = require('pg');
              const c = new Client({ connectionString: process.env.DATABASE_URL });
              c.connect().then(async () => {

                // -- Core blog tables --
                await c.query(\`CREATE TABLE IF NOT EXISTS blog (
                  id serial PRIMARY KEY, title varchar NOT NULL, slug varchar NOT NULL,
                  description varchar, updated_at timestamptz DEFAULT now() NOT NULL,
                  created_at timestamptz DEFAULT now() NOT NULL)\`);
                await c.query('CREATE UNIQUE INDEX IF NOT EXISTS blog_slug_idx ON blog (slug)');

                await c.query(\`CREATE TABLE IF NOT EXISTS blog_post (
                  id serial PRIMARY KEY, title varchar NOT NULL, slug varchar NOT NULL,
                  blog_id integer, visibility varchar DEFAULT 'draft' NOT NULL,
                  author varchar, published_at timestamptz, excerpt varchar,
                  featured_image_id integer,
                  seo_meta_title varchar, seo_meta_description varchar,
                  seo_canonical_url varchar, seo_no_index boolean DEFAULT false,
                  seo_open_graph_og_title varchar, seo_open_graph_og_description varchar,
                  seo_open_graph_og_image_id integer,
                  updated_at timestamptz DEFAULT now() NOT NULL,
                  created_at timestamptz DEFAULT now() NOT NULL)\`);
                await c.query('ALTER TABLE blog_post DROP COLUMN IF EXISTS content');
                await c.query('CREATE INDEX IF NOT EXISTS blog_post_slug_idx ON blog_post (slug)');
                await c.query('CREATE INDEX IF NOT EXISTS blog_post_blog_idx ON blog_post (blog_id)');

                await c.query(\`CREATE TABLE IF NOT EXISTS blog_post_tags (
                  _order integer NOT NULL, _parent_id integer NOT NULL,
                  id varchar PRIMARY KEY, tag varchar NOT NULL)\`);

                // -- Locked docs FK columns --
                await c.query('ALTER TABLE payload_locked_documents_rels ADD COLUMN IF NOT EXISTS blog_id integer');
                await c.query('ALTER TABLE payload_locked_documents_rels ADD COLUMN IF NOT EXISTS blog_post_id integer');

                // -- Block tables --
                const blocks = [
                  \`CREATE TABLE IF NOT EXISTS blog_post_blocks_direct_answer (
                    _order integer NOT NULL, _parent_id integer NOT NULL,
                    _path varchar NOT NULL,
                    id varchar PRIMARY KEY NOT NULL, block_name varchar,
                    question varchar NOT NULL, short_answer varchar NOT NULL, expanded_answer varchar)\`,
                  \`CREATE TABLE IF NOT EXISTS blog_post_blocks_definition (
                    _order integer NOT NULL, _parent_id integer NOT NULL,
                    _path varchar NOT NULL,
                    id varchar PRIMARY KEY NOT NULL, block_name varchar,
                    term varchar NOT NULL, definition varchar NOT NULL)\`,
                  \`CREATE TABLE IF NOT EXISTS blog_post_blocks_text (
                    _order integer NOT NULL, _parent_id integer NOT NULL,
                    _path varchar NOT NULL,
                    id varchar PRIMARY KEY NOT NULL, block_name varchar, content jsonb)\`,
                  \`CREATE TABLE IF NOT EXISTS blog_post_blocks_image (
                    _order integer NOT NULL, _parent_id integer NOT NULL,
                    _path varchar NOT NULL,
                    id varchar PRIMARY KEY NOT NULL, block_name varchar,
                    image_id integer, alt varchar, caption varchar)\`,
                  \`CREATE TABLE IF NOT EXISTS blog_post_blocks_video (
                    _order integer NOT NULL, _parent_id integer NOT NULL,
                    _path varchar NOT NULL,
                    id varchar PRIMARY KEY NOT NULL, block_name varchar,
                    youtube_url varchar, caption varchar)\`,
                  \`CREATE TABLE IF NOT EXISTS blog_post_blocks_gallery (
                    _order integer NOT NULL, _parent_id integer NOT NULL,
                    _path varchar NOT NULL,
                    id varchar PRIMARY KEY NOT NULL, block_name varchar)\`,
                  \`CREATE TABLE IF NOT EXISTS blog_post_blocks_gallery_images (
                    _order integer NOT NULL, _parent_id varchar NOT NULL,
                    id varchar PRIMARY KEY NOT NULL, image_id integer, alt varchar)\`,
                  \`CREATE TABLE IF NOT EXISTS blog_post_blocks_tip (
                    _order integer NOT NULL, _parent_id integer NOT NULL,
                    _path varchar NOT NULL,
                    id varchar PRIMARY KEY NOT NULL, block_name varchar,
                    title varchar, content varchar NOT NULL)\`,
                  \`CREATE TABLE IF NOT EXISTS blog_post_blocks_warning (
                    _order integer NOT NULL, _parent_id integer NOT NULL,
                    _path varchar NOT NULL,
                    id varchar PRIMARY KEY NOT NULL, block_name varchar,
                    title varchar, content varchar NOT NULL)\`,
                  \`CREATE TABLE IF NOT EXISTS blog_post_blocks_comparison_table (
                    _order integer NOT NULL, _parent_id integer NOT NULL,
                    _path varchar NOT NULL,
                    id varchar PRIMARY KEY NOT NULL, block_name varchar)\`,
                  \`CREATE TABLE IF NOT EXISTS blog_post_blocks_comparison_table_rows (
                    _order integer NOT NULL, _parent_id varchar NOT NULL,
                    id varchar PRIMARY KEY NOT NULL, feature varchar, option_a varchar, option_b varchar)\`,
                  \`CREATE TABLE IF NOT EXISTS blog_post_blocks_stats (
                    _order integer NOT NULL, _parent_id integer NOT NULL,
                    _path varchar NOT NULL,
                    id varchar PRIMARY KEY NOT NULL, block_name varchar)\`,
                  \`CREATE TABLE IF NOT EXISTS blog_post_blocks_stats_items (
                    _order integer NOT NULL, _parent_id varchar NOT NULL,
                    id varchar PRIMARY KEY NOT NULL, label varchar, value varchar)\`,
                  \`CREATE TABLE IF NOT EXISTS blog_post_blocks_pros_cons (
                    _order integer NOT NULL, _parent_id integer NOT NULL,
                    _path varchar NOT NULL,
                    id varchar PRIMARY KEY NOT NULL, block_name varchar)\`,
                  \`CREATE TABLE IF NOT EXISTS blog_post_blocks_pros_cons_pros (
                    _order integer NOT NULL, _parent_id varchar NOT NULL,
                    id varchar PRIMARY KEY NOT NULL, item varchar)\`,
                  \`CREATE TABLE IF NOT EXISTS blog_post_blocks_pros_cons_cons (
                    _order integer NOT NULL, _parent_id varchar NOT NULL,
                    id varchar PRIMARY KEY NOT NULL, item varchar)\`,
                  \`CREATE TABLE IF NOT EXISTS blog_post_blocks_related_posts (
                    _order integer NOT NULL, _parent_id integer NOT NULL,
                    _path varchar NOT NULL,
                    id varchar PRIMARY KEY NOT NULL, block_name varchar, title varchar)\`,
                  \`CREATE TABLE IF NOT EXISTS blog_post_blocks_related_posts_posts (
                    _order integer NOT NULL, _parent_id varchar NOT NULL,
                    id varchar PRIMARY KEY NOT NULL, slug varchar, post_id integer)\`,
                  \`CREATE TABLE IF NOT EXISTS blog_post_blocks_product_recommendation (
                    _order integer NOT NULL, _parent_id integer NOT NULL,
                    _path varchar NOT NULL,
                    id varchar PRIMARY KEY NOT NULL, block_name varchar,
                    product_handle varchar, title varchar)\`,
                  \`CREATE TABLE IF NOT EXISTS blog_post_blocks_faq (
                    _order integer NOT NULL, _parent_id integer NOT NULL,
                    _path varchar NOT NULL,
                    id varchar PRIMARY KEY NOT NULL, block_name varchar)\`,
                  \`CREATE TABLE IF NOT EXISTS blog_post_blocks_faq_questions (
                    _order integer NOT NULL, _parent_id varchar NOT NULL,
                    id varchar PRIMARY KEY NOT NULL, question varchar, answer varchar)\`,
                  \`CREATE TABLE IF NOT EXISTS blog_post_blocks_summary (
                    _order integer NOT NULL, _parent_id integer NOT NULL,
                    _path varchar NOT NULL,
                    id varchar PRIMARY KEY NOT NULL, block_name varchar)\`,
                  \`CREATE TABLE IF NOT EXISTS blog_post_blocks_summary_points (
                    _order integer NOT NULL, _parent_id varchar NOT NULL,
                    id varchar PRIMARY KEY NOT NULL, point varchar)\`,
                  \`CREATE TABLE IF NOT EXISTS blog_post_blocks_cta (
                    _order integer NOT NULL, _parent_id integer NOT NULL,
                    _path varchar NOT NULL,
                    id varchar PRIMARY KEY NOT NULL, block_name varchar,
                    title varchar, description varchar, button_text varchar, link varchar)\`,
                  \`CREATE TABLE IF NOT EXISTS blog_post_blocks_divider (
                    _order integer NOT NULL, _parent_id integer NOT NULL,
                    _path varchar NOT NULL,
                    id varchar PRIMARY KEY NOT NULL, block_name varchar)\`,
                  \`CREATE TABLE IF NOT EXISTS blog_post_blocks_table_of_contents (
                    _order integer NOT NULL, _parent_id integer NOT NULL,
                    _path varchar NOT NULL,
                    id varchar PRIMARY KEY NOT NULL, block_name varchar,
                    title varchar, auto_generate boolean DEFAULT true)\`,
                  \`CREATE TABLE IF NOT EXISTS blog_post_blocks_how_to_steps (
                    _order integer NOT NULL, _parent_id integer NOT NULL,
                    _path varchar NOT NULL,
                    id varchar PRIMARY KEY NOT NULL, block_name varchar,
                    title varchar)\`,
                  \`CREATE TABLE IF NOT EXISTS blog_post_blocks_how_to_steps_steps (
                    _order integer NOT NULL, _parent_id varchar NOT NULL,
                    id varchar PRIMARY KEY NOT NULL,
                    step_title varchar NOT NULL, description varchar, image_id integer)\`,
                  \`CREATE TABLE IF NOT EXISTS blog_post_blocks_table (
                    _order integer NOT NULL, _parent_id integer NOT NULL,
                    _path varchar NOT NULL,
                    id varchar PRIMARY KEY NOT NULL, block_name varchar,
                    caption varchar)\`,
                  \`CREATE TABLE IF NOT EXISTS blog_post_blocks_table_headers (
                    _order integer NOT NULL, _parent_id varchar NOT NULL,
                    id varchar PRIMARY KEY NOT NULL, label varchar)\`,
                  \`CREATE TABLE IF NOT EXISTS blog_post_blocks_table_rows (
                    _order integer NOT NULL, _parent_id varchar NOT NULL,
                    id varchar PRIMARY KEY NOT NULL, cells varchar)\`,
                  \`CREATE TABLE IF NOT EXISTS blog_post_blocks_table_of_contents_items (
                    _order integer NOT NULL, _parent_id varchar NOT NULL,
                    id varchar PRIMARY KEY NOT NULL, label varchar NOT NULL, anchor varchar)\`,
                ];
                for (const sql of blocks) { await c.query(sql); }

                // -- Add post_id to related_posts_posts (idempotent) --
                await c.query('ALTER TABLE blog_post_blocks_related_posts_posts ADD COLUMN IF NOT EXISTS post_id integer');

                // -- Unique index: one slug per blog --
                await c.query('CREATE UNIQUE INDEX IF NOT EXISTS blog_post_blog_id_slug_idx ON blog_post (blog_id, slug)');

                // -- Indexes on nested block tables --
                await c.query('CREATE INDEX IF NOT EXISTS blog_post_blocks_how_to_steps_steps_parent_idx ON blog_post_blocks_how_to_steps_steps (_parent_id)');
                await c.query('CREATE INDEX IF NOT EXISTS blog_post_blocks_table_headers_parent_idx ON blog_post_blocks_table_headers (_parent_id)');
                await c.query('CREATE INDEX IF NOT EXISTS blog_post_blocks_table_rows_parent_idx ON blog_post_blocks_table_rows (_parent_id)');
                await c.query('CREATE INDEX IF NOT EXISTS blog_post_blocks_table_of_contents_items_parent_idx ON blog_post_blocks_table_of_contents_items (_parent_id)');

                // -- Homepage active switch --
                await c.query('ALTER TABLE homepage ADD COLUMN IF NOT EXISTS is_active boolean DEFAULT false');
                await c.query('CREATE INDEX IF NOT EXISTS homepage_is_active_idx ON homepage (is_active)');
                await c.query(\`UPDATE homepage SET is_active = true WHERE id = (SELECT id FROM homepage ORDER BY updated_at DESC LIMIT 1) AND NOT EXISTS (SELECT 1 FROM homepage WHERE is_active = true)\`);

                // -- Seed migration history --
                const allMigrations = [
                  '20260216_081521_init', '20260218_003924', '20260218_135222',
                  '20260313_000000_add_blog', '20260315_000000_blog_blocks',
                  '20260316_000000_related_posts_relationship',
                  '20260317_000000_new_blocks', '20260318_000000_blog_fixes',
                  '20260319_000000_homepage_active'
                ];
                for (const name of allMigrations) {
                  await c.query(
                    'INSERT INTO payload_migrations (name,batch,updated_at,created_at) SELECT \$1::text,1,NOW(),NOW() WHERE NOT EXISTS (SELECT 1 FROM payload_migrations WHERE name=\$1::text)',
                    [name]
                  );
                }

                console.log('All blog + block tables ensured, migrations seeded');
                await c.end();
              }).catch(e => { console.error(e.message); c.end(); process.exit(1); });
            "
            pm2 restart payload-cms --update-env
